<script>
document.addEventListener('DOMContentLoaded', () => {
    const cart = {};
    const cartItemsEl = document.getElementById('cart-items');
    const cartEmptyEl = document.getElementById('cart-empty');
    const cartFooterEl = document.getElementById('cart-footer');
    const cartTotalEl = document.getElementById('cart-total');
    const checkoutOverlay = document.getElementById('checkout-overlay');
    const checkoutSummary = document.getElementById('checkout-summary');
    const successOverlay = document.getElementById('order-success');
    const orderRefEl = document.getElementById('order-ref');

    document.querySelectorAll('.btn-add-cart').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const card = btn.closest('.order-item-card');
            const id = card.dataset.id;
            const name = card.dataset.name;
            const price = parseFloat(card.dataset.price);

            if (cart[id]) {
                cart[id].qty++;
            } else {
                cart[id] = { name, price, qty: 1 };
            }

            btn.textContent = '✓ Ajouté';
            btn.classList.add('added');
            setTimeout(() => {
                btn.innerHTML = '<span class="plus-icon">+</span> Ajouter';
                btn.classList.remove('added');
            }, 1200);

            renderCart();
        });
    });

    function renderCart() {
        const ids = Object.keys(cart);
        if (ids.length === 0) {
            cartEmptyEl.style.display = 'block';
            cartFooterEl.style.display = 'none';
            document.querySelectorAll('.cart-line').forEach(el => el.remove());
            return;
        }
        cartEmptyEl.style.display = 'none';
        cartFooterEl.style.display = 'block';

        document.querySelectorAll('.cart-line').forEach(el => el.remove());

        let total = 0;
        ids.forEach(id => {
            const item = cart[id];
            const line = document.createElement('div');
            line.className = 'cart-line';
            line.innerHTML = `
                <div class="cart-line-info">
                    <span class="cart-line-name">${item.name}</span>
                    <div class="cart-qty-controls">
                        <button class="qty-btn qty-minus" data-id="${id}">−</button>
                        <span class="cart-qty">${item.qty}</span>
                        <button class="qty-btn qty-plus" data-id="${id}">+</button>
                    </div>
                </div>
                <span class="cart-line-price">${(item.price * item.qty).toFixed(2).replace('.', ',')} €</span>
            `;
            cartItemsEl.appendChild(line);
            total += item.price * item.qty;
        });

        cartTotalEl.textContent = total.toFixed(2).replace('.', ',') + ' €';

        document.querySelectorAll('.qty-minus').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                cart[id].qty--;
                if (cart[id].qty <= 0) delete cart[id];
                renderCart();
            });
        });
        document.querySelectorAll('.qty-plus').forEach(btn => {
            btn.addEventListener('click', () => {
                cart[btn.dataset.id].qty++;
                renderCart();
            });
        });
    }

    document.getElementById('btn-checkout').addEventListener('click', () => {
        let html = '<h3>Récapitulatif</h3><ul>';
        let total = 0;
        Object.values(cart).forEach(item => {
            html += `<li>${item.qty}× ${item.name} — ${(item.price * item.qty).toFixed(2).replace('.', ',')} €</li>`;
            total += item.price * item.qty;
        });
        html += `</ul><p class="checkout-total">Total : <strong>${total.toFixed(2).replace('.', ',')} €</strong></p>`;
        checkoutSummary.innerHTML = html;
        checkoutOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    });

    document.getElementById('checkout-close').addEventListener('click', () => {
        checkoutOverlay.classList.remove('active');
        document.body.style.overflow = '';
    });

    document.getElementById('checkout-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const ref = 'SR-' + Date.now().toString(36).toUpperCase();
        orderRefEl.textContent = 'Référence : ' + ref;
        checkoutOverlay.classList.remove('active');
        successOverlay.style.display = 'flex';
    });
});
</script>
