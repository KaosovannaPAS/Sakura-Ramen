<script>
document.addEventListener('DOMContentLoaded', () => {
    const items = document.querySelectorAll('.ryoko-menu-item');
    
    items.forEach(item => {
        item.addEventListener('click', function() {
            const newImageUrl = this.getAttribute('data-image');
            const section = this.closest('.ryoko-menu-section');
            const imageDisplay = section.querySelector('.ryoko-cat-image');
            
            if (newImageUrl && imageDisplay) {
                // Fade out
                imageDisplay.style.opacity = '0';
                
                setTimeout(() => {
                    // Change image
                    imageDisplay.style.backgroundImage = `url('${newImageUrl}')`;
                    // Fade in
                    imageDisplay.style.opacity = '1';
                }, 300);
            }
            
            // Highlight active item
            section.querySelectorAll('.ryoko-menu-item').forEach(i => i.classList.remove('active-item'));
            this.classList.add('active-item');
        });
    });
});
</script>
